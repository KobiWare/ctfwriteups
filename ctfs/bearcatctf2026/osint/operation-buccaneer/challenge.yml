name: Operation Buccaneer
author: Ian
category: osint
description: 'In the early 2000s, the FBI executed an operation to locate and prosecute
  members of the Warez scene. One of their operations targeted the group `DrinkOrDie`,
  and they ended up indicting and convicting quite a few people. There was one member,
  indicted after most of the convictions, who operated a high-traffic server for the
  group. What was the unique name given to his server?


  Enter in the form: `BCCTF{Server_name}`'
