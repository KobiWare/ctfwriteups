name: River Raiders
author: Ben
category: osint
description: '**AHOY!** We''ve intercepted an image of a rogue pirate vessel attempting
  to crash our CTF! They think they can sneak into the harbor unnoticed, but they
  made a fatal mistake—they posed for a photo with a famous landmark right behind
  them.


  We need you to identify the location so we can deploy our defenses! Look at the
  image `ship.jpg` and find the name of the **closest bridge** visible directly behind
  the ship.


  **Flag Format:** `BCCTF{Name of Bridge}`'
