name: Can Landlubbers Locate Information?
author: Ian
category: osint
description: "Whenever I legally download things that I have the right to, I make\
  \ sure that I'm tunneled into some large American city where traffic is chaotic\
  \ and the government can never track me. I actually stumbled across a city like\
  \ that recently, and they had this dope cell tower mimicking a chimney! And where\
  \ there's a cell tower, there's bound to be a telephone exchange. What is the CLLI\
  \ shared by all the switches in the nearest exchange?\r\n\r\nEnter your flag in\
  \ the format: `BCCTF{CLLI}`"
