name: Boarding of the Black Pearl
author: Gabe
category: forensics
description: 'The legendary Black Pearl was intercepted by the Royal Navy while sailing
  under cover of darkness.


  During the boarding, the Navy seized a document believed to contain contraband.
  A network capture recovered from the raid is all that remains.


  Analyze the traffic, reconstruct what was looted, and uncover the secret the Pearl
  was trying to hide.'
