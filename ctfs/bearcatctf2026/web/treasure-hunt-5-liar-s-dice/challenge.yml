name: Treasure Hunt 5 - Liar's Dice
author: Ian
category: web
description: "The flavor text at the end of the binary you just reverse engineered?\
  \ It mentioned liar's dice, which caught my eye. I had stumbled across a text file\
  \ with optimal strategies for an online version of the game while conducting data\
  \ recovery. I assumed it was meaningless, but 'water guy' actually left a message\
  \ for us:\r\n\r\nAh! You have reached the end of the trail! Back when I was but\
  \ a wee lad, I used to - roll the bones - as they say quite often indeed. The website\
  \ I played on was horribly insecure though... which made it perfect! I partook in\
  \ some dastardly activities and ruined the leaderboard. I also managed to SQL inject\
  \ their login system, and decided to make the admin password my most prized posession,\
  \ my treasure, a flag! If you want my treasure, you had better start digging!\r\n\
  \r\nOkay, so the dude is literally a cybercriminal. Fantastic. And his treasure\
  \ is just what? A flag? I thought there'd be some cash involved at least! Whatever.\
  \ Here's some corrupted source code and a link to the website. I'm done with this."
