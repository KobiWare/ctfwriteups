description: "Ahoy, Code-Breakers!\r\n\r\nThe Dread Captain Next thinks his fortress\
  \ is impenetrable, but he’s left the ship's articles—the very blueprints of how\
  \ his crew behaves—unguarded. We’ve heard whispers that if a clever pirate can poison\
  \ the source they can rewrite the fundamental laws of the ship itself.\r\n\r\nForging\
  \ your Next-Action scrolls is the key to mutiny. When you control the prototype,\
  \ the crew stops listening to the Captain and starts listening to you. Seize the\
  \ shell, and the flag shall be yours!"
